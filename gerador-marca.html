<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gerador de Marca — Circuito Paralelo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
  :root{
    --serif: 'Instrument Serif', Georgia, 'Iowan Old Style', 'Times New Roman', ui-serif, serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --ink:#111; --line: rgba(0,0,0,0.15); --gray:#6b6b6b; --hover:#f0f0f0; --paper:#fff;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; color:var(--ink); font-family:var(--sans); background:var(--paper); }
  a{ color:inherit; text-decoration:none; }
  button, select{ font:inherit; touch-action:manipulation; }

  .nav{ display:flex; gap:2px; font-family:var(--mono); font-size:0.75rem;
        background:#f4f4f4; border:1px solid var(--line); border-radius:999px; padding:3px; width:max-content; margin-bottom:1.6rem; }
  .nav a{ padding:0.5rem 0.9rem; border-radius:999px; color:var(--gray); }
  .nav a.active{ background:#111; color:#fff; }
  .nav a:not(.active):hover{ background:var(--hover); color:var(--ink); }

  .wrap{ display:grid; grid-template-columns:400px 1fr; min-height:100vh; }
  @media (max-width:900px){ .wrap{ grid-template-columns:1fr; } }

  .panel{ padding:calc(1.6rem + env(safe-area-inset-top)) 1.6rem 2rem; border-right:1px solid var(--line);
          overflow-y:auto; max-height:100vh; }
  @media (max-width:900px){ .panel{ border-right:none; border-bottom:1px solid var(--line); max-height:none; } }

  h1{ font-family:var(--serif); font-weight:400; font-size:2.1rem; line-height:1.05; margin:0 0 0.2rem; }
  .sub{ font-family:var(--mono); font-size:0.79rem; color:var(--gray); margin-bottom:1.6rem; }

  .field{ margin-bottom:1.6rem; }
  .field label{ display:block; font-family:var(--mono); font-size:0.73rem; text-transform:uppercase;
                letter-spacing:0.04em; color:var(--gray); margin-bottom:0.5rem; }

  .row-btns{ display:flex; gap:0.5rem; }
  .btn{ font-family:var(--mono); font-size:0.79rem; background:#fff; color:var(--ink); border:1px solid var(--ink);
        padding:0.6rem 0.9rem; cursor:pointer; border-radius:0; transition:background 0.15s ease, color 0.15s ease; }
  .btn:hover{ background:var(--ink); color:#fff; }
  .btn.primary{ background:var(--ink); color:#fff; width:100%; padding:0.85rem; font-size:0.83rem; }
  .btn.primary:hover{ opacity:0.8; }
  .btn:disabled{ opacity:0.35; cursor:default; pointer-events:none; }

  .checklist{ max-height:340px; overflow-y:auto; border:1px solid var(--line); }
  .check-row{ display:flex; align-items:baseline; gap:0.6rem; padding:0.55rem 0.7rem; border-bottom:1px solid var(--line); cursor:pointer; }
  .check-row:last-child{ border-bottom:none; }
  .check-row:hover{ background:var(--hover); }
  .check-row input{ margin-top:0.15rem; accent-color:var(--ink); }
  .check-row .cname{ font-family:var(--sans); font-size:0.86rem; line-height:1.3; }
  .check-row .cname small{ display:block; font-family:var(--mono); font-size:0.68rem; color:var(--gray); margin-top:0.1rem; }
  .check-order{ font-family:var(--mono); font-size:0.68rem; color:var(--gray); margin-left:auto; flex-shrink:0; }

  .count-note{ font-family:var(--mono); font-size:0.73rem; color:var(--gray); margin-top:0.5rem; line-height:1.4; }
  .status{ font-family:var(--mono); font-size:0.75rem; color:var(--gray); margin-top:0.9rem; min-height:1.2em; }
  .status.error{ color:#9A3324; }

  .stage{ display:flex; align-items:center; justify-content:center; padding:2.4rem; }
  .canvas-frame{ width:min(74vh, 100%); max-width:640px; aspect-ratio:1/1; border:1px solid var(--line);
                 box-shadow:0 12px 40px rgba(0,0,0,0.08); background:#fff; }
  #art{ width:100%; height:100%; display:block; }
</style>
</head>
<body>

<div class="wrap">
  <div class="panel">
    <div class="nav">
      <a href="ferramentas.html">ferramentas</a>
      <a href="gerador-marca.html" class="active">marca</a>
      <a href="gerador-mascara.html">máscara</a>
    </div>

    <h1>Gerador de<br>Marca</h1>
    <div class="sub">Circuito Paralelo — Ateliês do Centro do Rio</div>

    <div class="field">
      <label>Pontos do desenho</label>
      <div class="checklist" id="checklist"></div>
      <div class="count-note" id="count-note">selecione ao menos 2 ateliês — o título corre sobre a linha entre eles</div>
      <div class="row-btns" style="margin-top:0.7rem;">
        <button class="btn" id="btn-shuffle">sortear pontos</button>
        <button class="btn" id="btn-clear">limpar</button>
      </div>
    </div>

    <div class="field">
      <button class="btn primary" id="btn-download">baixar PNG</button>
      <div class="status" id="status"></div>
    </div>
  </div>

  <div class="stage">
    <div class="canvas-frame">
      <canvas id="art" width="1000" height="1000"></canvas>
    </div>
  </div>
</div>

<script>
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1Zjux0r3uVJ8ua1ZXpWd68lOSP5Kj0XkU/gviz/tq?tqx=out:csv&sheet=Circuito';
const EVENT_TITLE = 'Circuito Paralelo Ateliês do Centro do Rio';
const EVENT_DATES = '18 – 19 de Setembro';
const TITLE_SIZE = 44; // tamanho usado tanto no título correndo pela linha quanto na data abaixo

function parseCSV(text){
  const rows = []; let row = []; let field = ''; let inQuotes = false;
  for (let i = 0; i < text.length; i++){
    const c = text[i];
    if (inQuotes){
      if (c === '"'){ if (text[i+1] === '"'){ field += '"'; i++; } else { inQuotes = false; } }
      else { field += c; }
    } else {
      if (c === '"'){ inQuotes = true; }
      else if (c === ','){ row.push(field); field = ''; }
      else if (c === '\r'){ /* ignore */ }
      else if (c === '\n'){ row.push(field); field = ''; rows.push(row); row = []; }
      else { field += c; }
    }
  }
  if (field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}

async function loadLocationsFromSheet(){
  const res = await fetch(SHEET_CSV_URL);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  const table = parseCSV(text).filter(r => r.some(c => c !== undefined && c.trim() !== ''));
  if (table.length < 2) throw new Error('planilha vazia');
  const headers = table[0].map(h => h.trim());
  const hIdx = {}; headers.forEach((h,i)=>hIdx[h]=i);
  const get = (row, name) => { const i = hIdx[name]; return (i!=null && row[i]!=null) ? row[i].trim() : ''; };
  const locMap = {}; const order = [];
  table.slice(1).forEach(row => {
    const local = get(row,'Local / Coletivo');
    const endereco = get(row,'Endereço');
    const nome = get(row,'Nome do Artista');
    if (!endereco && !nome) return;
    const latRaw = get(row,'Latitude');
    const lngRaw = get(row,'Longitude');
    const key = endereco;
    if (!locMap[key]){
      locMap[key] = {
        id: 'loc' + order.length, local, endereco,
        lat: latRaw ? parseFloat(latRaw.replace(',', '.')) : null,
        lng: lngRaw ? parseFloat(lngRaw.replace(',', '.')) : null
      };
      order.push(key);
    }
  });
  return order.map(k => locMap[k]);
}

let LOCATIONS = [];
let bounds = null;
let selectedOrder = [];

const canvas = document.getElementById('art');
const ctx = canvas.getContext('2d');
const checklistEl = document.getElementById('checklist');
const countNote = document.getElementById('count-note');
const statusEl = document.getElementById('status');
const downloadBtn = document.getElementById('btn-download');

function setStatus(msg, isError){
  statusEl.textContent = msg || '';
  statusEl.classList.toggle('error', !!isError);
}

function renderChecklist(){
  checklistEl.innerHTML = '';
  const sorted = [...LOCATIONS].sort((a,b) =>
    (a.local||a.endereco).localeCompare(b.local||b.endereco, 'pt-BR', {sensitivity:'base'}));
  sorted.forEach(loc => {
    if (loc.lat == null || loc.lng == null) return;
    const row = document.createElement('label');
    row.className = 'check-row';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.value = loc.id;
    cb.checked = selectedOrder.includes(loc.id);
    cb.addEventListener('change', () => {
      if (cb.checked) selectedOrder.push(loc.id);
      else selectedOrder = selectedOrder.filter(id => id !== loc.id);
      renderChecklist();
      draw();
    });
    const name = document.createElement('span');
    name.className = 'cname';
    name.innerHTML = `${loc.local || loc.endereco}${loc.local ? `<small>${loc.endereco}</small>` : ''}`;
    row.appendChild(cb);
    row.appendChild(name);
    const orderIdx = selectedOrder.indexOf(loc.id);
    if (orderIdx > -1){
      const badge = document.createElement('span');
      badge.className = 'check-order';
      badge.textContent = String(orderIdx+1).padStart(2,'0');
      row.appendChild(badge);
    }
    checklistEl.appendChild(row);
  });
  countNote.textContent = selectedOrder.length < 2
    ? `${selectedOrder.length} selecionado(s) — mínimo de 2 para o título correr entre eles`
    : `${selectedOrder.length} pontos conectados, nesta ordem`;
}

document.getElementById('btn-shuffle').addEventListener('click', () => {
  const withCoords = LOCATIONS.filter(l => l.lat != null && l.lng != null);
  const n = Math.min(withCoords.length, 5 + Math.floor(Math.random()*4)); // 5 a 8
  const shuffled = [...withCoords].sort(() => Math.random()-0.5).slice(0, n);
  selectedOrder = shuffled.map(l => l.id);
  renderChecklist();
  draw();
});
document.getElementById('btn-clear').addEventListener('click', () => {
  selectedOrder = [];
  renderChecklist();
  draw();
});

function projectPoints(box){
  if (!bounds) return [];
  const { minLat, maxLat, minLng, maxLng } = bounds;
  const spanLat = (maxLat - minLat) || 1;
  const spanLng = (maxLng - minLng) || 1;
  return selectedOrder.map(id => {
    const loc = LOCATIONS.find(l => l.id === id);
    if (!loc) return null;
    const nx = (loc.lng - minLng) / spanLng;
    const ny = (maxLat - loc.lat) / spanLat;
    return { x: box.x + nx * box.w, y: box.y + ny * box.h };
  }).filter(Boolean);
}

function pathLength(points){
  let len = 0;
  for (let i = 1; i < points.length; i++) len += Math.hypot(points[i].x-points[i-1].x, points[i].y-points[i-1].y);
  return len;
}
function pointAtDistance(points, dist){
  let d = 0;
  for (let i = 1; i < points.length; i++){
    const seg = Math.hypot(points[i].x-points[i-1].x, points[i].y-points[i-1].y);
    if (d + seg >= dist){
      const t = seg === 0 ? 0 : (dist - d) / seg;
      const x = points[i-1].x + (points[i].x-points[i-1].x) * t;
      const y = points[i-1].y + (points[i].y-points[i-1].y) * t;
      const angle = Math.atan2(points[i].y-points[i-1].y, points[i].x-points[i-1].x);
      return { x, y, angle };
    }
    d += seg;
  }
  const last = points[points.length-1];
  return { x:last.x, y:last.y, angle:0 };
}
function drawTextAlongPath(ctx, text, points, fontSize, color, fontFamily){
  const total = pathLength(points);
  if (total < fontSize * 2) return;
  ctx.font = `${fontSize}px ${fontFamily}`;
  ctx.fillStyle = color;
  const unit = text + '   ·   ';
  let d = 0, safety = 0;
  while (d < total && safety < 3000){
    for (const ch of unit){
      if (d >= total) break;
      const w = ctx.measureText(ch).width;
      const pt = pointAtDistance(points, d);
      ctx.save();
      ctx.translate(pt.x, pt.y);
      ctx.rotate(pt.angle);
      ctx.fillText(ch, 0, 0);
      ctx.restore();
      d += w;
      safety++;
    }
  }
}

async function draw(){
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  ctx.strokeRect(0.5,0.5,W-1,H-1);

  const margin = 90;
  const box = { x: margin, y: margin, w: W - margin*2, h: 600 };
  const pts = projectPoints(box);

  if (pts.length >= 2){
    // sem traçado — só os pontos marcam os ateliês, o desenho da linha
    // é lido através do próprio texto que corre sobre ela
    pts.forEach(p => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(17,17,17,0.5)'; ctx.fill();
    });

    drawTextAlongPath(ctx, EVENT_TITLE, pts, TITLE_SIZE, '#111', "'Instrument Serif', Georgia, serif");
  } else {
    ctx.fillStyle = '#6b6b6b';
    ctx.font = '16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('selecione pontos ao lado', W/2, H/2);
    ctx.textAlign = 'left';
  }

  // data: mesma família e mesmo tamanho do título, em cinza — igual ao
  // par hero-title / hero-date do index.html
  ctx.textAlign = 'center';
  ctx.fillStyle = '#6b6b6b';
  ctx.font = `${TITLE_SIZE}px 'Instrument Serif', Georgia, serif`;
  ctx.fillText(EVENT_DATES, W/2, box.y + box.h + 110);
  ctx.textAlign = 'left';
}

downloadBtn.addEventListener('click', () => {
  setStatus('');
  canvas.toBlob(blob => {
    if (!blob){ setStatus('Não foi possível gerar o PNG.', true); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `circuito-paralelo-marca.png`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }, 'image/png');
});

async function boot(){
  try{ await document.fonts.load(`${TITLE_SIZE}px 'Instrument Serif'`); } catch(e){}
  try{
    LOCATIONS = await loadLocationsFromSheet();
  } catch(err){
    console.error(err);
    setStatus('Não foi possível carregar os dados da planilha agora. Recarregue a página em instantes.', true);
    downloadBtn.disabled = true;
    return;
  }
  const withCoords = LOCATIONS.filter(l => l.lat != null && l.lng != null);
  if (withCoords.length){
    bounds = {
      minLat: Math.min(...withCoords.map(l=>l.lat)),
      maxLat: Math.max(...withCoords.map(l=>l.lat)),
      minLng: Math.min(...withCoords.map(l=>l.lng)),
      maxLng: Math.max(...withCoords.map(l=>l.lng)),
    };
  }
  renderChecklist();
  draw();
}
boot();
</script>
</body>
</html>
