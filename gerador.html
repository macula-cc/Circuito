<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gerador de Marca — Circuito Paralelo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
  :root{
    --serif: 'Instrument Serif', Georgia, 'Iowan Old Style', 'Times New Roman', ui-serif, serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --ink:#111;
    --line: rgba(0,0,0,0.15);
    --gray: #6b6b6b;
    --hover: #f0f0f0;
    --paper:#fff;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; color:var(--ink); font-family:var(--sans); background:var(--paper); }
  a{ color:inherit; }
  button, select{ font:inherit; touch-action:manipulation; }

  .wrap{ display:grid; grid-template-columns:400px 1fr; min-height:100vh; }
  @media (max-width:900px){ .wrap{ grid-template-columns:1fr; } }

  .panel{ padding:calc(1.6rem + env(safe-area-inset-top)) 1.6rem 2rem; border-right:1px solid var(--line);
          overflow-y:auto; max-height:100vh; }
  @media (max-width:900px){ .panel{ border-right:none; border-bottom:1px solid var(--line); max-height:none; } }

  h1{ font-family:var(--serif); font-weight:400; font-size:2.1rem; line-height:1.05; margin:0 0 0.2rem; }
  .sub{ font-family:var(--mono); font-size:0.79rem; color:var(--gray); margin-bottom:1.6rem; }

  .field{ margin-bottom:1.6rem; }
  .field label{ display:block; font-family:var(--mono); font-size:0.73rem; text-transform:uppercase;
                letter-spacing:0.04em; color:var(--gray); margin-bottom:0.5rem; }
  select{ width:100%; padding:0.65rem 0.7rem; border:1px solid var(--ink); border-radius:0; background:#fff;
          color:var(--ink); font-family:var(--sans); font-size:0.94rem; }

  .row-btns{ display:flex; gap:0.5rem; }
  .btn{ font-family:var(--mono); font-size:0.79rem; background:#fff; color:var(--ink); border:1px solid var(--ink);
        padding:0.6rem 0.9rem; cursor:pointer; border-radius:0; transition:background 0.15s ease, color 0.15s ease; }
  .btn:hover{ background:var(--ink); color:#fff; }
  .btn.primary{ background:var(--ink); color:#fff; width:100%; padding:0.85rem; font-size:0.83rem; }
  .btn.primary:hover{ opacity:0.8; background:var(--ink); }
  .btn:disabled{ opacity:0.35; cursor:default; pointer-events:none; }

  .checklist{ max-height:260px; overflow-y:auto; border:1px solid var(--line); }
  .check-row{ display:flex; align-items:baseline; gap:0.6rem; padding:0.55rem 0.7rem; border-bottom:1px solid var(--line);
              cursor:pointer; }
  .check-row:last-child{ border-bottom:none; }
  .check-row:hover{ background:var(--hover); }
  .check-row input{ margin-top:0.15rem; accent-color:var(--ink); }
  .check-row .cname{ font-family:var(--sans); font-size:0.86rem; line-height:1.3; }
  .check-row .cname small{ display:block; font-family:var(--mono); font-size:0.68rem; color:var(--gray); margin-top:0.1rem; }
  .check-order{ font-family:var(--mono); font-size:0.68rem; color:var(--gray); margin-left:auto; flex-shrink:0; }

  .count-note{ font-family:var(--mono); font-size:0.73rem; color:var(--gray); margin-top:0.5rem; }
  .status{ font-family:var(--mono); font-size:0.75rem; color:var(--gray); margin-top:0.9rem; min-height:1.2em; }
  .status.error{ color:#9A3324; }

  .stage{ display:flex; align-items:center; justify-content:center; padding:2.4rem; }
  .canvas-frame{ width:min(74vh, 100%); max-width:640px; aspect-ratio:1/1; border:1px solid var(--line);
                 box-shadow:0 12px 40px rgba(0,0,0,0.08); background:#f4f4f4; }
  #art{ width:100%; height:100%; display:block; }
</style>
</head>
<body>

<div class="wrap">
  <div class="panel">
    <h1>Gerador de<br>Marca</h1>
    <div class="sub">Circuito Paralelo — Ateliês do Centro</div>

    <div class="field">
      <label for="artist-select">Artista</label>
      <select id="artist-select"><option>carregando…</option></select>
    </div>

    <div class="field">
      <label>Pontos do desenho</label>
      <div class="checklist" id="checklist"></div>
      <div class="count-note" id="count-note">selecione ao menos 3 ateliês para formar uma máscara fechada</div>
      <div class="row-btns" style="margin-top:0.7rem;">
        <button class="btn" id="btn-shuffle">sortear pontos</button>
        <button class="btn" id="btn-clear">limpar</button>
      </div>
    </div>

    <div class="field">
      <button class="btn primary" id="btn-download">baixar PNG</button>
      <div class="status" id="status"></div>
    </div>
  </div>

  <div class="stage">
    <div class="canvas-frame">
      <canvas id="art" width="1000" height="1000"></canvas>
    </div>
  </div>
</div>

<script>
/* ============================================================
   mesma fonte de dados do site principal do circuito
   ============================================================ */
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1Zjux0r3uVJ8ua1ZXpWd68lOSP5Kj0XkU/gviz/tq?tqx=out:csv&sheet=Circuito';
const EVENT_TITLE = 'CIRCUITO PARALELO';
const EVENT_DATES = '18–19 DE SETEMBRO';

function parseCSV(text){
  const rows = []; let row = []; let field = ''; let inQuotes = false;
  for (let i = 0; i < text.length; i++){
    const c = text[i];
    if (inQuotes){
      if (c === '"'){ if (text[i+1] === '"'){ field += '"'; i++; } else { inQuotes = false; } }
      else { field += c; }
    } else {
      if (c === '"'){ inQuotes = true; }
      else if (c === ','){ row.push(field); field = ''; }
      else if (c === '\r'){ /* ignore */ }
      else if (c === '\n'){ row.push(field); field = ''; rows.push(row); row = []; }
      else { field += c; }
    }
  }
  if (field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}

async function loadLocationsFromSheet(){
  const res = await fetch(SHEET_CSV_URL);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  const table = parseCSV(text).filter(r => r.some(c => c !== undefined && c.trim() !== ''));
  if (table.length < 2) throw new Error('planilha vazia');

  const headers = table[0].map(h => h.trim());
  const hIdx = {}; headers.forEach((h,i)=>hIdx[h]=i);
  const get = (row, name) => { const i = hIdx[name]; return (i!=null && row[i]!=null) ? row[i].trim() : ''; };

  const locMap = {}; const order = [];
  table.slice(1).forEach(row => {
    const local = get(row,'Local / Coletivo');
    const endereco = get(row,'Endereço');
    const nome = get(row,'Nome do Artista');
    if (!endereco && !nome) return;
    const instagram = get(row,'Instagram').replace(/^@/, '');
    const foto = get(row,'Foto do trabalho (URL)');
    const latRaw = get(row,'Latitude');
    const lngRaw = get(row,'Longitude');
    const key = endereco;
    if (!locMap[key]){
      locMap[key] = {
        id: 'loc' + order.length, local, endereco,
        lat: latRaw ? parseFloat(latRaw.replace(',', '.')) : null,
        lng: lngRaw ? parseFloat(lngRaw.replace(',', '.')) : null,
        artistas: []
      };
      order.push(key);
    }
    locMap[key].artistas.push({ nome, instagram, foto });
  });
  return order.map(k => locMap[k]);
}

function initials(name){
  const parts = (name||'').trim().split(/\s+/).filter(Boolean);
  if (parts.length === 0) return '?';
  if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}

/* ============================================================
   estado
   ============================================================ */
let LOCATIONS = [];
let FLAT_ARTISTS = [];      // { nome, instagram, foto, loc }
let bounds = null;          // { minLat, maxLat, minLng, maxLng }
let selectedOrder = [];     // array de loc.id na ordem em que foram marcados
let currentArtist = null;
let loadedImg = null;       // Image() do artista atual
let imgFailed = false;

const canvas = document.getElementById('art');
const ctx = canvas.getContext('2d');
const artistSelect = document.getElementById('artist-select');
const checklistEl = document.getElementById('checklist');
const countNote = document.getElementById('count-note');
const statusEl = document.getElementById('status');
const downloadBtn = document.getElementById('btn-download');

function setStatus(msg, isError){
  statusEl.textContent = msg || '';
  statusEl.classList.toggle('error', !!isError);
}

/* ============================================================
   ui: checklist de ateliês
   ============================================================ */
function renderChecklist(){
  checklistEl.innerHTML = '';
  const sorted = [...LOCATIONS].sort((a,b) =>
    (a.local||a.endereco).localeCompare(b.local||b.endereco, 'pt-BR', {sensitivity:'base'}));

  sorted.forEach(loc => {
    if (loc.lat == null || loc.lng == null) return; // sem coordenada, não entra no desenho
    const row = document.createElement('label');
    row.className = 'check-row';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.value = loc.id;
    cb.checked = selectedOrder.includes(loc.id);
    cb.addEventListener('change', () => {
      if (cb.checked) selectedOrder.push(loc.id);
      else selectedOrder = selectedOrder.filter(id => id !== loc.id);
      renderChecklist();
      draw();
    });
    const name = document.createElement('span');
    name.className = 'cname';
    name.innerHTML = `${loc.local || loc.endereco}${loc.local ? `<small>${loc.endereco}</small>` : ''}`;
    row.appendChild(cb);
    row.appendChild(name);
    const orderIdx = selectedOrder.indexOf(loc.id);
    if (orderIdx > -1){
      const badge = document.createElement('span');
      badge.className = 'check-order';
      badge.textContent = String(orderIdx+1).padStart(2,'0');
      row.appendChild(badge);
    }
    checklistEl.appendChild(row);
  });

  countNote.textContent = selectedOrder.length < 3
    ? `${selectedOrder.length} selecionado(s) — mínimo de 3 para fechar a máscara`
    : `${selectedOrder.length} pontos conectados, nesta ordem`;
}

document.getElementById('btn-shuffle').addEventListener('click', () => {
  const withCoords = LOCATIONS.filter(l => l.lat != null && l.lng != null);
  const n = Math.min(withCoords.length, 4 + Math.floor(Math.random()*4)); // 4 a 7
  const shuffled = [...withCoords].sort(() => Math.random()-0.5).slice(0, n);
  selectedOrder = shuffled.map(l => l.id);
  renderChecklist();
  draw();
});
document.getElementById('btn-clear').addEventListener('click', () => {
  selectedOrder = [];
  renderChecklist();
  draw();
});

/* ============================================================
   ui: seleção de artista
   ============================================================ */
function renderArtistSelect(){
  artistSelect.innerHTML = '';
  FLAT_ARTISTS.forEach((a, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${a.nome} — ${a.loc.local || a.loc.endereco}`;
    artistSelect.appendChild(opt);
  });
  if (FLAT_ARTISTS.length){
    artistSelect.value = 0;
    setArtist(0);
  }
}

function setArtist(idx){
  currentArtist = FLAT_ARTISTS[idx];
  imgFailed = false;
  loadedImg = null;
  if (currentArtist && currentArtist.foto){
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { loadedImg = img; draw(); };
    img.onerror = () => { imgFailed = true; loadedImg = null; draw(); };
    img.src = currentArtist.foto;
  }
  draw();
}
artistSelect.addEventListener('change', () => setArtist(parseInt(artistSelect.value, 10)));

/* ============================================================
   geometria: mapeia lat/lng dos pontos selecionados para a área
   quadrada da foto (com margem interna)
   ============================================================ */
function projectPoints(box){
  if (!bounds) return [];
  const { minLat, maxLat, minLng, maxLng } = bounds;
  const spanLat = (maxLat - minLat) || 1;
  const spanLng = (maxLng - minLng) || 1;
  return selectedOrder.map(id => {
    const loc = LOCATIONS.find(l => l.id === id);
    if (!loc) return null;
    const nx = (loc.lng - minLng) / spanLng;
    const ny = (maxLat - loc.lat) / spanLat; // norte para cima
    return { x: box.x + nx * box.w, y: box.y + ny * box.h };
  }).filter(Boolean);
}

function pathLength(points){
  let len = 0;
  for (let i = 1; i < points.length; i++){
    len += Math.hypot(points[i].x-points[i-1].x, points[i].y-points[i-1].y);
  }
  return len;
}
function pointAtDistance(points, dist){
  let d = 0;
  for (let i = 1; i < points.length; i++){
    const seg = Math.hypot(points[i].x-points[i-1].x, points[i].y-points[i-1].y);
    if (d + seg >= dist){
      const t = seg === 0 ? 0 : (dist - d) / seg;
      const x = points[i-1].x + (points[i].x-points[i-1].x) * t;
      const y = points[i-1].y + (points[i].y-points[i-1].y) * t;
      const angle = Math.atan2(points[i].y-points[i-1].y, points[i].x-points[i-1].x);
      return { x, y, angle };
    }
    d += seg;
  }
  const last = points[points.length-1];
  return { x:last.x, y:last.y, angle:0 };
}

function drawTextAlongPath(ctx, text, points, fontSize, color){
  const total = pathLength(points);
  if (total < fontSize * 2) return;
  ctx.font = `${fontSize}px var(--mono), ui-monospace, monospace`;
  ctx.font = `${fontSize}px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace`;
  ctx.fillStyle = color;
  const unit = text + '   ·   ';
  let d = 0;
  let safety = 0;
  while (d < total && safety < 2000){
    for (const ch of unit){
      if (d >= total) break;
      const w = ctx.measureText(ch).width;
      const pt = pointAtDistance(points, d);
      ctx.save();
      ctx.translate(pt.x, pt.y);
      ctx.rotate(pt.angle);
      ctx.fillText(ch, 0, 0);
      ctx.restore();
      d += w;
      safety++;
    }
  }
}

/* ============================================================
   desenho principal
   ============================================================ */
async function draw(){
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0,0,W,H);

  // moldura fina
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  ctx.strokeRect(0.5,0.5,W-1,H-1);

  const margin = 60;
  const photoBox = { x: margin, y: margin, w: W - margin*2, h: 600 };

  const pts = projectPoints(photoBox);
  const canMask = pts.length >= 3;

  ctx.save();
  ctx.beginPath();
  ctx.rect(photoBox.x, photoBox.y, photoBox.w, photoBox.h);
  ctx.clip();

  if (canMask){
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
    ctx.clip();
  }

  if (loadedImg){
    // cover-fit dentro do retângulo da foto
    const ir = loadedImg.width / loadedImg.height;
    const br = photoBox.w / photoBox.h;
    let dw, dh, dx, dy;
    if (ir > br){ dh = photoBox.h; dw = dh * ir; dx = photoBox.x - (dw-photoBox.w)/2; dy = photoBox.y; }
    else { dw = photoBox.w; dh = dw / ir; dx = photoBox.x; dy = photoBox.y - (dh-photoBox.h)/2; }
    ctx.filter = 'grayscale(1) contrast(1.05) brightness(1.03)';
    ctx.drawImage(loadedImg, dx, dy, dw, dh);
    ctx.filter = 'none';
  } else {
    ctx.fillStyle = '#e4e4e4';
    ctx.fillRect(photoBox.x, photoBox.y, photoBox.w, photoBox.h);
    ctx.fillStyle = '#6b6b6b';
    ctx.font = '48px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(currentArtist ? initials(currentArtist.nome) : '—', photoBox.x+photoBox.w/2, photoBox.y+photoBox.h/2);
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  }
  ctx.restore();

  // linhas de conexão + pontos, por cima da foto
  if (pts.length >= 2){
    ctx.save();
    ctx.beginPath();
    ctx.rect(photoBox.x, photoBox.y, photoBox.w, photoBox.h);
    ctx.clip();

    ctx.strokeStyle = 'rgba(17,17,17,0.75)';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();

    pts.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
      ctx.strokeStyle = '#111';
      ctx.lineWidth = 1.4;
      ctx.stroke();
    });

    drawTextAlongPath(ctx, EVENT_TITLE, pts, 15, 'rgba(17,17,17,0.9)');
    ctx.restore();
  }

  // divisória
  const textY = photoBox.y + photoBox.h + 40;
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(margin, textY - 20); ctx.lineTo(W-margin, textY - 20); ctx.stroke();

  ctx.textAlign = 'left';
  ctx.fillStyle = '#6b6b6b';
  ctx.font = '13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
  ctx.fillText(`${EVENT_TITLE} · ${EVENT_DATES}`, margin, textY);

  ctx.fillStyle = '#111';
  ctx.font = "52px 'Instrument Serif', Georgia, serif";
  ctx.fillText(currentArtist ? currentArtist.nome : '—', margin, textY + 60);

  ctx.fillStyle = '#6b6b6b';
  ctx.font = '14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
  const addrLine = currentArtist
    ? (currentArtist.loc.local ? `${currentArtist.loc.local} — ${currentArtist.loc.endereco}` : currentArtist.loc.endereco)
    : '—';
  ctx.fillText(addrLine, margin, textY + 92);
}

/* ============================================================
   download
   ============================================================ */
downloadBtn.addEventListener('click', () => {
  setStatus('');
  try{
    canvas.toBlob(blob => {
      if (!blob){ setStatus('Não foi possível gerar o PNG.', true); return; }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const slug = (currentArtist ? currentArtist.nome : 'marca').toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
      a.href = url; a.download = `circuito-paralelo-${slug || 'marca'}.png`;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }, 'image/png');
  } catch(err){
    console.error(err);
    setStatus('A foto deste artista bloqueia a exportação (restrição de CORS da origem da imagem). Tente selecionar outro artista, ou salve a arte por print da tela.', true);
  }
});

/* ============================================================
   boot
   ============================================================ */
async function boot(){
  try{
    await document.fonts.load("52px 'Instrument Serif'");
  } catch(e){ /* segue mesmo se a fonte não carregar a tempo */ }

  try{
    LOCATIONS = await loadLocationsFromSheet();
  } catch(err){
    console.error(err);
    setStatus('Não foi possível carregar os dados da planilha agora. Recarregue a página em instantes.', true);
    downloadBtn.disabled = true;
    return;
  }

  const withCoords = LOCATIONS.filter(l => l.lat != null && l.lng != null);
  if (withCoords.length){
    bounds = {
      minLat: Math.min(...withCoords.map(l=>l.lat)),
      maxLat: Math.max(...withCoords.map(l=>l.lat)),
      minLng: Math.min(...withCoords.map(l=>l.lng)),
      maxLng: Math.max(...withCoords.map(l=>l.lng)),
    };
  }

  LOCATIONS.forEach(loc => loc.artistas.forEach(art => {
    if (art.nome) FLAT_ARTISTS.push({ ...art, loc });
  }));
  FLAT_ARTISTS.sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR',{sensitivity:'base'}));

  renderArtistSelect();
  renderChecklist();
  draw();
}
boot();
</script>
</body>
</html>
